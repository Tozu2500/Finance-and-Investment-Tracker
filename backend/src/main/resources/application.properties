# Server
server.port=8080

# Database - update credentials before running
spring.datasource.url=jdbc:mysql://localhost:3306/finance_tracker?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT - replace secret with a Base64-encoded 256-bit key (32+ chars before encoding)
app.jwt.secret=ZmluYW5jZS10cmFja2VyLXNlY3JldC1rZXktMjAyNi1zdXBlci1zZWN1cmUtcGxlYXNlLWNoYW5nZS1tZQ==
app.jwt.expiration=86400000

# File upload (for CSV import)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.financetracker=INFO

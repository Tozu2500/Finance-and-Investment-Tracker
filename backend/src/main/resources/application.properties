# Server
server.port=8080
server.compression.enabled=true
server.compression.mime-types=application/json,text/plain,text/html
server.compression.min-response-size=1024

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/finance_tracker?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP connection pool
spring.datasource.hikari.pool-name=FinanceSuitePool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.generate_statistics=false

# JWT
app.jwt.secret=${JWT_SECRET:ZmluYW5jZS10cmFja2VyLXNlY3JldC1rZXktMjAyNi1zdXBlci1zZWN1cmUtcGxlYXNlLWNoYW5nZS1tZQ==}
app.jwt.expiration=86400000

# File upload (for CSV import)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Error handling — never leak stack traces to clients
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-exception=false

# Logging
logging.level.com.financetracker=INFO
logging.level.com.zaxxer.hikari=WARN
